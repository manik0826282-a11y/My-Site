<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { background: #0a0a0f; color: #f0f0ff; font-family: system-ui; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
  .box { max-width: 340px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #2a2a3a; border-top-color: #6c63ff; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 20px; margin-bottom: 8px; }
  p { color: #8888aa; font-size: 14px; }
  a { color: #a78bfa; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h2>Redirecting...</h2>
  <p id="msg">Link খোঁজা হচ্ছে...</p>
</div>
<script>
(async () => {
  const { createClient } = supabase;
  const parts = window.location.pathname.split('/').filter(Boolean);
  const slug = parts.pop() || '';
  if (!slug) { window.location.replace('/'); return; }
  if (typeof SUPABASE_URL === 'undefined') { document.getElementById('msg').innerHTML = 'Config missing. <a href="/">Home</a>'; return; }
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data } = await sb.from('links').select('dest').eq('slug', slug).single();
  if (data?.dest) {
    await sb.rpc('increment_clicks', { link_slug: slug });
    window.location.replace(data.dest);
  } else {
    document.getElementById('msg').innerHTML = `"${slug}" link পাওয়া যায়নি। <a href="/">Home এ যান</a>`;
  }
})();
</script>
</body>
</html>
